<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #c9a84c; --gold-dim: #8a6d2e; --gold-glow: rgba(201,168,76,0.15);
    --ink: #07060f; --ink2: #0e0c1a; --ink3: #161328;
    --text: #e8dfc8; --text-muted: #8e84a0;
    --purple-soft: rgba(90,63,160,0.2); --border: rgba(201,168,76,0.18);
    --red-fg: #e06060; --red-bg: rgba(200,60,60,0.12); --red-border: rgba(200,60,60,0.35);
    --green-fg: #6bbf85; --green-bg: rgba(60,160,90,0.12); --green-border: rgba(60,160,90,0.3);
  }
  html { scroll-behavior: smooth; }
  body { background: var(--ink); color: var(--text); font-family: 'EB Garamond', Georgia, serif; font-size: 18px; line-height: 1.75; overflow-x: hidden; }
  #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  #geo-svg   { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.04; }
  .site-wrap { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 0 2rem; }

  /* NAV */
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1rem 2.5rem; background: rgba(7,6,15,0.88); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); gap: 1rem; flex-wrap: wrap; }
  .nav-logo { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; color: var(--gold); font-family: 'Cinzel', serif; font-size: 1rem; letter-spacing: 0.12em; white-space: nowrap; }
  .nav-logo svg { width: 28px; height: 28px; flex-shrink: 0; }
  .nav-right { display: flex; align-items: center; gap: 1.2rem; }
  .nav-links { display: flex; gap: 1.5rem; list-style: none; }
  .nav-links a { color: var(--text-muted); text-decoration: none; font-family: 'Cinzel', serif; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; transition: color 0.3s; }
  .nav-links a:hover { color: var(--gold); }

  /* LANGUAGE TOGGLE */
  .lang-toggle { display: flex; align-items: center; background: var(--ink2); border: 1px solid var(--border); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
  .lang-btn { background: none; border: none; color: var(--text-muted); font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.15em; padding: 0.3rem 0.65rem; cursor: pointer; transition: background 0.25s, color 0.25s; }
  .lang-btn.active { background: var(--gold-glow); color: var(--gold); }
  .lang-sep { color: var(--border); font-size: 0.7rem; pointer-events: none; }

  /* ADMIN BUTTON */
  .admin-lock-btn { background: none; border: 1px solid rgba(255,255,255,0.07); color: var(--text-muted); font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.15em; padding: 0.3rem 0.75rem; cursor: pointer; border-radius: 2px; transition: border-color 0.3s, color 0.3s, background 0.3s; white-space: nowrap; }
  .admin-lock-btn:hover { border-color: var(--gold-dim); color: var(--gold-dim); }
  .admin-lock-btn.unlocked { border-color: var(--gold-dim); color: var(--gold); background: var(--gold-glow); }

  /* HERO */
  #hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 6rem 2rem 4rem; position: relative; }
  .eye-icon { width: 120px; height: 120px; margin-bottom: 2.5rem; animation: eye-pulse 4s ease-in-out infinite; filter: drop-shadow(0 0 24px rgba(201,168,76,0.5)); }
  @keyframes eye-pulse { 0%,100%{transform:scale(1);filter:drop-shadow(0 0 24px rgba(201,168,76,0.5));}50%{transform:scale(1.05);filter:drop-shadow(0 0 40px rgba(201,168,76,0.8));} }
  .hero-title { font-family: 'Cinzel Decorative', serif; font-size: clamp(2.2rem,6vw,4rem); font-weight: 400; color: var(--gold); letter-spacing: 0.08em; line-height: 1.15; margin-bottom: 0.8rem; }
  .hero-sub { font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1.8rem; }
  .hero-tagline { font-style: italic; font-size: 1.15rem; color: var(--text-muted); max-width: 480px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; }
  .scroll-hint { position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 0.5rem; color: var(--text-muted); font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; animation: fade-bob 2.5s ease-in-out infinite; }
  .scroll-hint::after { content: ''; width: 1px; height: 36px; background: linear-gradient(to bottom, var(--gold-dim), transparent); }
  @keyframes fade-bob { 0%,100%{opacity:0.4;transform:translateX(-50%) translateY(0);}50%{opacity:1;transform:translateX(-50%) translateY(6px);} }

  /* DIVIDER */
  .rune-divider { display: flex; align-items: center; gap: 1.2rem; margin: 3.5rem 0; color: var(--gold-dim); font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.25em; }
  .rune-divider::before, .rune-divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold-dim), transparent); }

  /* SECTIONS */
  section { padding: 5rem 0; }
  .section-label { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.75rem; }
  .section-label::before { content: ''; width: 20px; height: 1px; background: var(--gold); }
  .section-title { font-family: 'Cinzel', serif; font-size: clamp(1.4rem,3vw,2rem); font-weight: 600; color: var(--text); margin-bottom: 2rem; line-height: 1.25; }

  /* ABOUT */
  #about .about-card { background: var(--ink2); border: 1px solid var(--border); border-radius: 2px; padding: 2.5rem; position: relative; overflow: hidden; }
  #about .about-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  #about .about-card p { color: var(--text); margin-bottom: 1rem; }
  #about .about-card p:last-of-type { margin-bottom: 0; }
  .sigil-row { display: flex; gap: 1.5rem; margin-top: 2rem; flex-wrap: wrap; }
  .sigil-badge { display: flex; align-items: center; gap: 0.5rem; background: var(--purple-soft); border: 1px solid rgba(90,63,160,0.35); border-radius: 2px; padding: 0.4rem 1rem; font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.12em; color: #b09bde; }
  .sigil-badge::before { content: '◈'; color: var(--gold); font-size: 0.6rem; }

  /* BLOG */
  #blog { padding-bottom: 2rem; }
  .blog-controls { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
  .btn-add { display: flex; align-items: center; gap: 0.5rem; background: transparent; border: 1px solid var(--gold-dim); color: var(--gold); font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; padding: 0.6rem 1.4rem; cursor: pointer; border-radius: 2px; transition: background 0.3s, border-color 0.3s; }
  .btn-add:hover { background: var(--gold-glow); border-color: var(--gold); }
  .btn-add.hidden { display: none !important; }

  /* STATUS BANNER */
  .status-banner { display: flex; align-items: center; gap: 0.75rem; border-radius: 2px; padding: 0.65rem 1rem; margin-bottom: 2rem; font-family: 'Cinzel', serif; font-size: 0.64rem; letter-spacing: 0.1em; border: 1px solid; transition: all 0.5s; }
  .status-banner.synced  { background: var(--green-bg); border-color: var(--green-border); color: var(--green-fg); }
  .status-banner.loading { background: rgba(90,63,160,0.1); border-color: rgba(90,63,160,0.22); color: #9d8fd0; }
  .status-banner.error   { background: var(--red-bg); border-color: var(--red-border); color: var(--red-fg); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: currentColor; }
  .status-banner.synced  .status-dot { animation: pulse-dot 2s ease-in-out infinite; }
  .status-banner.loading .status-dot { animation: spin-dot 1s linear infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:0.35;} }
  @keyframes spin-dot  { 0%{opacity:1;} 50%{opacity:0.2;} 100%{opacity:1;} }

  /* POSTS */
  #posts-container { display: flex; flex-direction: column; gap: 1.5rem; }
  .post-card { background: var(--ink2); border: 1px solid var(--border); border-radius: 2px; padding: 2rem 2rem 1.75rem; cursor: pointer; transition: border-color 0.35s, background 0.35s; position: relative; overflow: hidden; }
  .post-card::after { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--gold); transform: scaleY(0); transform-origin: bottom; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
  .post-card:hover { background: var(--ink3); border-color: rgba(201,168,76,0.35); }
  .post-card:hover::after, .post-card.expanded::after { transform: scaleY(1); }
  .post-card.expanded { border-color: rgba(201,168,76,0.4); background: var(--ink3); }

  /* ADMIN ACTIONS */
  .card-admin-bar { display: none; position: absolute; top: 0.75rem; right: 0.9rem; gap: 0.4rem; z-index: 10; }
  .card-admin-bar.visible { display: flex; }
  .card-btn { background: var(--ink3); border: 1px solid var(--border); color: var(--text-muted); font-family: 'Cinzel', serif; font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.25rem 0.65rem; cursor: pointer; border-radius: 2px; transition: background 0.25s, color 0.25s, border-color 0.25s; }
  .card-btn:hover { color: var(--gold); border-color: var(--gold-dim); background: var(--gold-glow); }
  .card-btn.del:hover { color: var(--red-fg); border-color: var(--red-border); background: var(--red-bg); }

  .post-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
  .post-date { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.2em; color: var(--gold-dim); text-transform: uppercase; }
  .post-tag { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.15em; color: #8c79c4; background: var(--purple-soft); border: 1px solid rgba(90,63,160,0.25); padding: 0.15rem 0.6rem; border-radius: 1px; }
  .post-title { font-family: 'Cinzel', serif; font-size: 1.15rem; font-weight: 600; color: var(--text); margin-bottom: 0.5rem; line-height: 1.35; transition: color 0.3s; padding-right: 5rem; }
  .post-card:hover .post-title, .post-card.expanded .post-title { color: var(--gold); }
  .post-preview { color: var(--text-muted); font-size: 0.95rem; line-height: 1.65; }
  .post-body { display: none; margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid var(--border); color: var(--text); font-size: 1rem; line-height: 1.8; animation: fade-in 0.3s ease; }
  .post-card.expanded .post-body { display: block; }
  @keyframes fade-in { from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);} }
  .read-toggle { margin-top: 1rem; font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.2em; color: var(--gold-dim); text-transform: uppercase; display: flex; align-items: center; gap: 0.5rem; user-select: none; }
  .read-toggle::before { content: '▸'; }
  .post-card.expanded .read-toggle::before { content: '▾'; }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 0.2em; }
  .empty-state::before { content: '◌'; display: block; font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.3; }

  /* MODALS */
  .modal-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(7,6,15,0.9); backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 2rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--ink2); border: 1px solid var(--border); border-radius: 2px; padding: 2.5rem; width: 100%; max-width: 560px; position: relative; animation: modal-enter 0.3s cubic-bezier(0.34,1.56,0.64,1); max-height: 90vh; overflow-y: auto; }
  .modal-sm { max-width: 400px; }
  @keyframes modal-enter { from{opacity:0;transform:scale(0.92) translateY(16px);}to{opacity:1;transform:scale(1) translateY(0);} }
  .modal::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .modal-title { font-family: 'Cinzel', serif; font-size: 1rem; letter-spacing: 0.15em; color: var(--gold); margin-bottom: 1.75rem; }
  .field { margin-bottom: 1.2rem; }
  .field label { display: block; font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.45rem; }
  .field input, .field textarea { width: 100%; background: var(--ink3); border: 1px solid var(--border); border-radius: 2px; color: var(--text); font-family: 'EB Garamond', serif; font-size: 1rem; padding: 0.65rem 0.9rem; outline: none; transition: border-color 0.3s; resize: vertical; }
  .field input:focus, .field textarea:focus { border-color: var(--gold-dim); }
  .field input[type="password"] { letter-spacing: 0.2em; }
  .field textarea { min-height: 110px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem; flex-wrap: wrap; }
  .btn-cancel { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; padding: 0.6rem 1.2rem; cursor: pointer; border-radius: 2px; transition: border-color 0.3s, color 0.3s; }
  .btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }
  .btn-submit { background: var(--gold-glow); border: 1px solid var(--gold-dim); color: var(--gold); font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; padding: 0.6rem 1.6rem; cursor: pointer; border-radius: 2px; transition: background 0.3s, border-color 0.3s; }
  .btn-submit:hover { background: rgba(201,168,76,0.25); border-color: var(--gold); }
  .btn-submit:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-danger { background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red-fg); font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; padding: 0.6rem 1.2rem; cursor: pointer; border-radius: 2px; transition: background 0.3s; }
  .btn-danger:hover { background: rgba(200,60,60,0.22); }
  .error-msg { font-family: 'Cinzel', serif; font-size: 0.67rem; letter-spacing: 0.1em; color: var(--red-fg); margin-top: 0.5rem; min-height: 1.1rem; }

  /* FOOTER */
  footer { text-align: center; padding: 3rem 2rem 4rem; border-top: 1px solid var(--border); color: var(--text-muted); font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.2em; }
  footer .eye-small { display: inline-block; margin-bottom: 1rem; opacity: 0.35; }

  @media (max-width: 640px) {
    nav { padding: 0.8rem 1rem; }
    .nav-links { display: none; }
    .site-wrap { padding: 0 1.1rem; }
    .modal { padding: 1.75rem 1.2rem; }
    .post-card { padding: 1.2rem 1.2rem 1rem; }
    #about .about-card { padding: 1.5rem; }
  }
</style>
</head>

<!-- CONTENT -->
<div class="site-wrap">

// ══════════════════════════════════════════════════════

const _ap   = atob('dGhpcmRleWUyNQ=='); // password: thirdeye25
let lang    = localStorage.getItem('te_lang') || 'en';
let isAdmin = false;
let posts   = []; // populated by Firebase listener

// ══════════════════════════════════════════════════════
//  TRANSLATIONS HELPER
// ══════════════════════════════════════════════════════
function tr(k) { return T[lang][k] || T.en[k] || k; }

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => { el.innerHTML = tr(el.dataset.i18n); });
  document.getElementById('new-title').placeholder   = tr('ph_title');
  document.getElementById('new-tag').placeholder     = tr('ph_tag');
  document.getElementById('new-preview').placeholder = tr('ph_preview');
  document.getElementById('new-body').placeholder    = tr('ph_body');
  document.getElementById('admin-pw-input').placeholder = '••••••••';
  document.getElementById('btn-add-post').textContent   = tr('btn_new_entry');
  const ab = document.getElementById('admin-lock-btn');

  setStatus(currentStatus);

function setLang(l) {
  lang = l;
  localStorage.setItem('te_lang', l);
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('btn-no').classList.toggle('active', l === 'no');
  applyTranslations();
  renderPosts();
}

// ══════════════════════════════════════════════════════
//  STATUS BANNER
// ══════════════════════════════════════════════════════
let currentStatus = 'loading';
function setStatus(type) {
  currentStatus = type;
  const banner = document.getElementById('status-banner');
  const text   = document.getElementById('status-text');
  banner.className = 'status-banner ' + type;
  text.textContent = tr('status_' + type);
}

// ══════════════════════════════════════════════════════
//  FIREBASE INTEGRATION
// ══════════════════════════════════════════════════════
function initFirebase() {
  if (!window._fb) { setStatus('error'); return; }
  const { onValue, postsRef } = window._fb;

  // Real-time listener — fires on every change from any device
  onValue(postsRef, (snapshot) => {
    const data = snapshot.val();
    posts = data ? Object.entries(data).map(([key, val]) => ({ ...val, _key: key })) : [];
    setStatus('synced');
    renderPosts();
  }, (err) => {
    console.error('Firebase error:', err);
    setStatus('error');
  });
}

// ══════════════════════════════════════════════════════
//  ADMIN
// ══════════════════════════════════════════════════════
function handleAdminBtn() {
  if (isAdmin) { isAdmin = false; updateAdminState(); }
  else {
    document.getElementById('admin-pw-input').value = '';
    document.getElementById('admin-error').textContent = '';
    openModal('admin-modal');
    setTimeout(() => document.getElementById('admin-pw-input').focus(), 120);
  }
}

function submitAdminLogin() {
  if (document.getElementById('admin-pw-input').value === _ap) {
    isAdmin = true;
    document.getElementById('admin-pw-input').value = '';
    document.getElementById('admin-error').textContent = '';
    closeModal('admin-modal');
    updateAdminState();
  } else {
    document.getElementById('admin-error').textContent = tr('admin_error_wrong');
    document.getElementById('admin-pw-input').select();
  }
}

function updateAdminState() {
  const btn    = document.getElementById('admin-lock-btn');
  const addBtn = document.getElementById('btn-add-post');
  btn.textContent = isAdmin ? tr('admin_btn_label_on') : tr('admin_btn_label');
  btn.classList.toggle('unlocked', isAdmin);
  addBtn.classList.toggle('hidden', !isAdmin);
  renderPosts();
}

// ══════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════
function renderPosts() {
  const c = document.getElementById('posts-container');
  c.innerHTML = '';

  if (!posts.length) {
    c.innerHTML = `<div class="empty-state">${tr('empty_state')}</div>`;
    return;
  }

  const sorted = [...posts].sort((a, b) => new Date(b.date) - new Date(a.date));
  sorted.forEach(post => {
    const locale    = tr('date_locale');
    const formatted = new Date(post.date + 'T00:00:00').toLocaleDateString(locale, { day:'numeric', month:'long', year:'numeric' });
    const card = document.createElement('article');
    card.className  = 'post-card';
    card.dataset.key = post._key;
    card.innerHTML = `
      <div class="card-admin-bar${isAdmin ? ' visible' : ''}">
        <button class="card-btn"     onclick="editPost(event,'${post._key}')">${tr('btn_edit')}</button>
        <button class="card-btn del" onclick="askDelete(event,'${post._key}')">${tr('btn_del')}</button>
      </div>
      <div class="post-meta">
        <span class="post-date">${formatted}</span>
        ${post.tag ? `<span class="post-tag">${post.tag}</span>` : ''}
      </div>
      <h3 class="post-title">${post.title}</h3>
      <p class="post-preview">${post.preview}</p>
      <div class="post-body">${post.body}</div>
      <div class="read-toggle">${tr('read_entry')}</div>
    `;
    card.addEventListener('click', () => togglePost(card));
    c.appendChild(card);
  });
}

function togglePost(card) {
  const was = card.classList.contains('expanded');
  document.querySelectorAll('.post-card.expanded').forEach(c => {
    c.classList.remove('expanded');
    c.querySelector('.read-toggle').textContent = tr('read_entry');
  });
  if (!was) {
    card.classList.add('expanded');
    card.querySelector('.read-toggle').textContent = tr('close_entry');
  }
}

// ══════════════════════════════════════════════════════
//  POST MODAL
// ══════════════════════════════════════════════════════
function openPostModal(editKey) {
  const isEdit = editKey !== null;
  document.getElementById('post-modal-heading').textContent   = isEdit ? tr('post_modal_edit_title') : tr('post_modal_new_title');
  document.getElementById('post-submit-btn').textContent      = isEdit ? tr('btn_save') : tr('btn_inscribe');
  document.getElementById('post-submit-btn').disabled         = false;
  document.getElementById('edit-key').value                   = editKey || '';

  if (isEdit) {
    const p = posts.find(x => x._key === editKey);
    document.getElementById('new-title').value   = p.title;
    document.getElementById('new-date').value    = p.date;
    document.getElementById('new-tag').value     = p.tag || '';
    document.getElementById('new-preview').value = p.preview;
    document.getElementById('new-body').value    = p.body.replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]+>/g, '');
  } else {
    ['new-title','new-tag','new-preview','new-body'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('new-date').value = new Date().toISOString().split('T')[0];
  }
  openModal('post-modal');
  setTimeout(() => document.getElementById('new-title').focus(), 120);
}

function submitPost() {
  const title = document.getElementById('new-title').value.trim();
  const date  = document.getElementById('new-date').value;
  if (!title || !date) { document.getElementById('new-title').focus(); return; }

  const tag     = document.getElementById('new-tag').value.trim();
  const preview = document.getElementById('new-preview').value.trim();
  const body    = document.getElementById('new-body').value.trim().replace(/\n/g, '<br>');
  const editKey = document.getElementById('edit-key').value;

  const { set, push, postsRef, ref, db } = window._fb;
  const submitBtn = document.getElementById('post-submit-btn');
  submitBtn.disabled = true;

  const postData = { title, date, tag, preview: preview || title, body };

  if (editKey) {
    set(ref(db, 'posts/' + editKey), { ...postData, _key: editKey })
      .then(() => closeModal('post-modal'))
      .catch(() => { submitBtn.disabled = false; });
  } else {
    const newRef = push(postsRef);
    set(newRef, postData)
      .then(() => closeModal('post-modal'))
      .catch(() => { submitBtn.disabled = false; });
  }
}

function editPost(e, key) {
  e.stopPropagation();
  openPostModal(key);
}

// ══════════════════════════════════════════════════════

function askDelete(e, key) {
  e.stopPropagation();
  document.getElementById('delete-key').value              = key;
  document.getElementById('del-heading').textContent       = tr('delete_title');
  document.getElementById('del-body').textContent          = tr('delete_body');
  document.getElementById('del-cancel-btn').textContent    = tr('btn_cancel');
  document.getElementById('del-confirm-btn').textContent   = tr('btn_del');
  openModal('delete-modal');
}

function confirmDelete() {
  const key = document.getElementById('delete-key').value;
  const { remove, ref, db } = window._fb;
  remove(ref(db, 'posts/' + key)).then(() => closeModal('delete-modal'));
}

// ══════════════════════════════════════════════════════

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeIfOverlay(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }

// ══════════════════════════════════════════════════════
//  CANVAS
// ══════════════════════════════════════════════════════
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, stars=[], orbs=[];
  function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
  function initStars(){ stars=Array.from({length:180},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+0.2,a:Math.random(),sp:Math.random()*0.003+0.001,ph:Math.random()*Math.PI*2})); }
  function initOrbs(){ orbs=Array.from({length:5},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.18,vy:(Math.random()-0.5)*0.18,r:Math.random()*120+80,hue:Math.random()>0.5?'201,168,76':'90,63,160',a:Math.random()*0.04+0.015})); }
  let t=0;
  function draw(){
    ctx.clearRect(0,0,W,H); t+=0.012;
    orbs.forEach(o=>{
      o.x+=o.vx; o.y+=o.vy;
      if(o.x<-o.r)o.x=W+o.r; if(o.x>W+o.r)o.x=-o.r;
      if(o.y<-o.r)o.y=H+o.r; if(o.y>H+o.r)o.y=-o.r;
      const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
      g.addColorStop(0,`rgba(${o.hue},${o.a})`); g.addColorStop(1,`rgba(${o.hue},0)`);
      ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
    });
    stars.forEach(s=>{
      const al=s.a*(0.4+0.6*Math.sin(t*s.sp*60+s.ph));
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(232,223,200,${al})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize(); initStars(); initOrbs(); draw();
  window.addEventListener('resize',()=>{ resize(); initStars(); initOrbs(); });
})();

// ══════════════════════════════════════════════════════

if (window._fbReady) {

} else {
